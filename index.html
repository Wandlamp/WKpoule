<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ WK 2026 Poule</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c10;--surf:#0f1520;--surf2:#162030;--bord:#1d2e42;
  --green:#00e87a;--gdim:rgba(0,232,122,.13);--glow:rgba(0,232,122,.3);
  --orange:#ff6b35;--gold:#ffd700;
  --txt:#e8edf2;--muted:#5a7a9a;--dim:#243448;
  --r:12px;--rs:8px;
}
html{font-size:16px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;min-height:100vh;
  background-image:radial-gradient(ellipse 90% 50% at 50% -10%,rgba(0,232,122,.06) 0%,transparent 60%)}
h1,h2,h3,.mono{font-family:'Bebas Neue',sans-serif;letter-spacing:.04em}
button{cursor:pointer;font-family:inherit;border:none}
input{font-family:inherit}

/* ─── LAYOUT ─── */
#app{min-height:100vh;display:flex;flex-direction:column}
.header{position:sticky;top:0;z-index:50;background:rgba(8,12,16,.92);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--bord);padding:0 1.25rem}
.header-inner{max-width:920px;margin:0 auto;height:56px;display:flex;align-items:center;justify-content:space-between;gap:.75rem}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.45rem;color:var(--green);letter-spacing:.08em;white-space:nowrap}
.logo em{color:var(--muted);font-style:normal;font-size:.8em}
.nav{display:flex;gap:.2rem}
.nav-btn{background:transparent;border:1px solid transparent;border-radius:var(--rs);color:var(--muted);
  padding:.35rem .85rem;font-size:.82rem;font-weight:600;transition:all .15s}
.nav-btn:hover{color:var(--txt);border-color:var(--bord)}
.nav-btn.active{color:var(--green);background:var(--gdim);border-color:rgba(0,232,122,.25)}
.page{max-width:920px;margin:0 auto;padding:1.75rem 1.25rem 5rem;width:100%}

/* ─── BUTTONS ─── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.45rem;
  padding:.65rem 1.4rem;border-radius:var(--rs);font-size:.9rem;font-weight:700;border:none;transition:all .15s;cursor:pointer}
.btn-primary{background:var(--green);color:#050a0e}
.btn-primary:hover{background:#00ff88;box-shadow:0 0 22px var(--glow)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
.btn-outline{background:transparent;border:1px solid var(--bord);color:var(--txt)}
.btn-outline:hover{border-color:var(--green);color:var(--green)}
.btn-danger{background:transparent;border:1px solid rgba(255,107,53,.3);color:var(--orange)}
.btn-danger:hover{background:rgba(255,107,53,.1)}
.btn-sm{padding:.4rem .9rem;font-size:.8rem}
.btn-ghost{background:transparent;border:none;color:var(--muted);padding:.35rem .7rem;font-size:.85rem}
.btn-ghost:hover{color:var(--txt)}

/* ─── WELCOME ─── */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:2rem;text-align:center;gap:0}
.welcome-icon{font-size:5rem;margin-bottom:1.25rem;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.welcome h1{font-size:clamp(3rem,8vw,5.5rem);line-height:.9;margin-bottom:.5rem}
.welcome h1 span{color:var(--green)}
.welcome-sub{color:var(--muted);font-size:1rem;margin-bottom:2.5rem;max-width:400px;line-height:1.6}
.welcome-form{display:flex;flex-direction:column;gap:.75rem;width:100%;max-width:340px}
.welcome-form label{font-size:.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;text-align:left}
.input-big{width:100%;padding:.8rem 1.1rem;background:var(--surf2);border:1px solid var(--bord);
  border-radius:var(--rs);color:var(--txt);font-size:1.05rem;transition:all .15s}
.input-big:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--glow)}
.welcome-links{margin-top:2rem;display:flex;gap:1.5rem;font-size:.82rem}
.welcome-links a{color:var(--muted);cursor:pointer;transition:color .15s}
.welcome-links a:hover{color:var(--green)}

/* ─── FILTERS ─── */
.filter-bar{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1.25rem}
.filter-btn{background:var(--surf);border:1px solid var(--bord);border-radius:var(--rs);
  color:var(--muted);padding:.32rem .8rem;font-family:'Bebas Neue',sans-serif;font-size:.95rem;
  letter-spacing:.04em;transition:all .15s;cursor:pointer}
.filter-btn:hover{color:var(--txt);border-color:rgba(0,232,122,.3)}
.filter-btn.on{background:var(--gdim);border-color:rgba(0,232,122,.3);color:var(--green)}

/* ─── MATCH CARD ─── */
.match-list{display:flex;flex-direction:column;gap:.65rem}
.match-card{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);
  padding:.9rem 1.1rem;display:grid;grid-template-columns:1fr 150px 1fr;
  align-items:center;gap:.75rem;transition:border-color .15s;position:relative;overflow:hidden}
.match-card::after{content:'';position:absolute;left:0;top:0;width:3px;height:100%;
  background:var(--bord);transition:background .15s}
.match-card.filled::after{background:var(--green)}
.match-card.locked{opacity:.7}
.match-card.locked::after{background:var(--dim)}
.match-card:not(.locked):hover{border-color:rgba(0,232,122,.18)}

.team{display:flex;align-items:center;gap:.5rem;font-weight:600;font-size:.88rem;line-height:1.2}
.team.right{flex-direction:row-reverse;text-align:right}
.flag{font-size:1.3rem;line-height:1;flex-shrink:0}

.match-center{display:flex;flex-direction:column;align-items:center;gap:.35rem}
.match-meta{font-size:.68rem;color:var(--muted);text-align:center;line-height:1.4}
.score-row{display:flex;align-items:center;gap:.35rem}
.score-in{width:38px;height:38px;background:var(--surf2);border:1px solid var(--bord);
  border-radius:6px;color:var(--txt);font-family:'Bebas Neue',sans-serif;font-size:1.35rem;
  text-align:center;transition:all .15s;-moz-appearance:textfield}
.score-in::-webkit-inner-spin-button,.score-in::-webkit-outer-spin-button{-webkit-appearance:none}
.score-in:focus{outline:none;border-color:var(--green);background:var(--gdim);box-shadow:0 0 0 3px var(--glow)}
.score-in:disabled{opacity:.5;cursor:not-allowed}
.sep{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--muted)}
.real-score{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--txt);
  display:flex;align-items:center;gap:.3rem}
.pts-badge{display:inline-flex;align-items:center;justify-content:center;
  min-width:26px;height:20px;border-radius:20px;font-size:.68rem;font-weight:700;padding:0 .3rem}
.pts-3{background:rgba(255,215,0,.15);color:var(--gold)}
.pts-1{background:var(--gdim);color:var(--green)}
.pts-0{background:rgba(90,122,154,.1);color:var(--muted)}
.locked-badge{font-size:.68rem;color:var(--muted);background:var(--dim);border-radius:4px;padding:.15rem .4rem}
.pred-display{font-family:'Bebas Neue',sans-serif;font-size:1.25rem;color:var(--muted)}

/* ─── PROGRESS BAR ─── */
.progress-bar-wrap{height:3px;background:var(--bord);border-radius:2px;margin-bottom:1.25rem;overflow:hidden}
.progress-bar{height:100%;background:var(--green);border-radius:2px;transition:width .4s ease}

/* ─── SECTION TITLE ─── */
.stitle{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;letter-spacing:.05em;margin-bottom:1rem;
  display:flex;align-items:center;gap:.5rem}
.stitle span{color:var(--green)}
.stitle small{font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:400;color:var(--muted);letter-spacing:0}

/* ─── LEADERBOARD ─── */
.lb{display:flex;flex-direction:column;gap:.5rem}
.lb-hdr{display:grid;grid-template-columns:40px 1fr 48px 48px 60px;gap:.75rem;
  padding:.25rem 1.1rem;font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.lb-hdr div:last-child{text-align:right}
.lb-row{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);
  padding:.85rem 1.1rem;display:grid;grid-template-columns:40px 1fr 48px 48px 60px;
  align-items:center;gap:.75rem;transition:all .15s}
.lb-row:hover{border-color:rgba(0,232,122,.2)}
.lb-row.me{border-color:rgba(0,232,122,.35);background:linear-gradient(90deg,var(--gdim),var(--surf))}
.lb-rank{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--muted);text-align:center}
.lb-rank.r1{color:var(--gold)}.lb-rank.r2{color:#b0c4de}.lb-rank.r3{color:#cd7f32}
.lb-name{font-weight:700;font-size:.9rem;display:flex;align-items:center;gap:.4rem}
.me-tag{font-size:.68rem;color:var(--green);background:var(--gdim);padding:.1rem .35rem;border-radius:10px}
.lb-stat{font-size:.82rem;color:var(--muted);text-align:center}
.lb-pts{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--green);text-align:right}
.lb-empty{text-align:center;color:var(--muted);padding:3rem 1rem;font-size:.9rem}

/* ─── CODE VIEW ─── */
.code-box{background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r);
  padding:1.25rem;font-family:'Courier New',monospace;font-size:.75rem;word-break:break-all;
  line-height:1.7;color:var(--green);max-height:160px;overflow-y:auto;user-select:all}
.step{display:flex;gap:.75rem;align-items:flex-start;padding:.85rem 0;border-bottom:1px solid var(--bord)}
.step:last-child{border-bottom:none}
.step-num{background:var(--green);color:#050a0e;border-radius:50%;width:26px;height:26px;
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;flex-shrink:0;margin-top:.1rem}
.step-txt{font-size:.88rem;line-height:1.6;color:var(--muted)}
.step-txt strong{color:var(--txt)}

/* ─── ADMIN ─── */
.admin-card{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:1.25rem;margin-bottom:1rem}
.admin-card h3{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;margin-bottom:.85rem;color:var(--txt)}
.code-paste{width:100%;padding:.65rem .9rem;background:var(--surf2);border:1px solid var(--bord);
  border-radius:var(--rs);color:var(--txt);font-size:.82rem;font-family:'Courier New',monospace;resize:vertical;min-height:70px}
.code-paste:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--glow)}
.player-chip{display:inline-flex;align-items:center;gap:.35rem;background:var(--gdim);
  border:1px solid rgba(0,232,122,.2);border-radius:20px;padding:.25rem .6rem;font-size:.78rem;margin:.25rem}
.player-chip button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.9rem;line-height:1;padding:0 0 0 .25rem}
.player-chip button:hover{color:var(--orange)}
.admin-score-in{width:34px;height:34px;background:var(--surf2);border:1px solid var(--bord);
  border-radius:6px;color:var(--txt);font-family:'Bebas Neue',sans-serif;font-size:1.2rem;
  text-align:center;-moz-appearance:textfield}
.admin-score-in::-webkit-inner-spin-button,.admin-score-in::-webkit-outer-spin-button{-webkit-appearance:none}
.admin-score-in:focus{outline:none;border-color:var(--orange);background:rgba(255,107,53,.08)}
.admin-match{background:var(--surf2);border:1px solid var(--bord);border-radius:var(--rs);
  padding:.75rem 1rem;display:grid;grid-template-columns:1fr 120px 1fr;align-items:center;gap:.5rem;margin-bottom:.5rem}
.admin-match .team{font-size:.82rem}
.admin-match .match-center{gap:.25rem}
.saved-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}

/* ─── TOAST ─── */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);
  background:var(--surf2);border:1px solid var(--bord);border-radius:var(--rs);
  padding:.65rem 1.25rem;font-size:.85rem;font-weight:600;z-index:999;
  animation:toastin .2s ease,toastout .3s ease 2s forwards;white-space:nowrap;
  box-shadow:0 8px 32px rgba(0,0,0,.5)}
@keyframes toastin{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastout{to{opacity:0;transform:translateX(-50%) translateY(10px)}}

/* ─── PIN ─── */
.pin-wrap{display:flex;flex-direction:column;align-items:center;padding:3rem 1rem;gap:1rem;text-align:center}
.pin-wrap h2{font-size:1.6rem}
.pin-input{width:140px;padding:.7rem;text-align:center;letter-spacing:.3em;font-size:1.2rem;
  background:var(--surf2);border:1px solid var(--bord);border-radius:var(--rs);color:var(--txt)}
.pin-input:focus{outline:none;border-color:var(--orange)}

/* ─── MISC ─── */
.divider{height:1px;background:var(--bord);margin:1.25rem 0}
.badge{display:inline-block;padding:.18rem .5rem;border-radius:20px;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.badge-grn{background:var(--gdim);color:var(--green);border:1px solid rgba(0,232,122,.2)}
.badge-org{background:rgba(255,107,53,.1);color:var(--orange);border:1px solid rgba(255,107,53,.2)}
.badge-muted{background:var(--dim);color:var(--muted)}
.spinner{width:32px;height:32px;border:3px solid var(--bord);border-top-color:var(--green);
  border-radius:50%;animation:spin .7s linear infinite;margin:3rem auto}
@keyframes spin{to{transform:rotate(360deg)}}
.flex{display:flex}.gap-2{gap:.5rem}.gap-3{gap:.75rem}.mt-1{margin-top:.5rem}.mt-2{margin-top:1rem}
.txt-muted{color:var(--muted)}.txt-sm{font-size:.82rem}
.save-bar{display:flex;justify-content:flex-end;align-items:center;gap:.75rem;margin-top:1.25rem;
  padding-top:1rem;border-top:1px solid var(--bord)}
.save-ok{font-size:.82rem;color:var(--green)}
@media(max-width:600px){
  .match-card{grid-template-columns:1fr;gap:.6rem}
  .team.right{flex-direction:row;text-align:left}
  .match-center{flex-direction:row;justify-content:space-between}
  .lb-row,.lb-hdr{grid-template-columns:32px 1fr 48px 60px}
  .lb-stat:nth-child(4){display:none}
  .nav-btn{padding:.3rem .6rem;font-size:.75rem}
}
</style>
</head>

function load() {
  try {
    const raw = localStorage.getItem('wk2026');
    if (raw) {
      const saved = JSON.parse(raw);
      S.name = saved.name || '';
      S.preds = saved.preds || {};
      S.admin = saved.admin || { unlocked: false, players: [], results: {} };
      S.admin.unlocked = false; // never persist unlock
      if (S.name) S.view = 'preds';
    }
  } catch {}
}

function save() {
  try {
    localStorage.setItem('wk2026', JSON.stringify({ name: S.name, preds: S.preds, admin: S.admin }));
  } catch {}
  S.dirty = false;
  S.saveOk = true;
  render();
  setTimeout(() => { S.saveOk = false; render(); }, 2500);
}

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
function isLocked(m) {
  return Date.now() > new Date(m.dt).getTime() - 60 * 60 * 1000;
}

function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleString('nl-NL', {
    weekday:'short', day:'numeric', month:'short',
    hour:'2-digit', minute:'2-digit', timeZone:'Europe/Amsterdam'
  });
}

function outcome(h, a) { return h > a ? 'H' : h < a ? 'A' : 'D'; }

function calcPts(pred, res) {
  if (!res || res.h == null || res.a == null) return null;
  if (pred.h === res.h && pred.a === res.a) return 3;
  return outcome(pred.h, pred.a) === outcome(res.h, res.a) ? 1 : 0;
}

function makeCode(name, preds) {
  return btoa(JSON.stringify({ n: name, p: preds }));
}

function parseCode(code) {
  try { return JSON.parse(atob(code.trim())); } catch { return null; }
}

function buildLb() {
  const all = [...S.admin.players];
  // add current player if not already in list
  if (S.name) {
    if (!all.find(p => p.name === S.name)) {
      all.push({ name: S.name, preds: S.preds });
    }
  }
  return all.map(player => {
    let pts = 0, exact = 0, correct = 0, played = 0;
    MATCHES.forEach(m => {
      const pred = player.preds[m.id];
      const res = S.admin.results[m.id];
      if (!pred) return;
      if (res && res.h != null) {
        played++;
        const p = calcPts(pred, res);
        pts += p; if (p === 3) exact++; if (p >= 1) correct++;
      }
    });
    return { name: player.name, pts, exact, correct, played, isMe: player.name === S.name };
  }).sort((a, b) => b.pts - a.pts || b.exact - a.exact);
}

function toast(msg, color) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.style.borderColor = color === 'green' ? 'rgba(0,232,122,.4)' : color === 'orange' ? 'rgba(255,107,53,.4)' : 'var(--bord)';
  t.style.color = color === 'green' ? 'var(--green)' : color === 'orange' ? 'var(--orange)' : 'var(--txt)';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2600);
}

function viewPreds() {
  const total = MATCHES.length;

  let ms = MATCHES;
  if (S.filterG !== 'all') ms = ms.filter(m => m.g === S.filterG);
  if (S.filterD !== 'all') ms = ms.filter(m => m.d === +S.filterD);

  const cards = ms.map(m => {
    const locked = isLocked(m);
    const pred = S.preds[m.id];
    const res = S.admin.results[m.id];
    const hv = pred ? pred.h : '';
    const av = pred ? pred.a : '';
    let pts = null;
    if (res && pred) pts = calcPts(pred, res);
    const isFilled = pred != null;

    let centerContent;
    if (res && res.h != null) {
      // game played — show result + pts
      const ptsHtml = pts !== null
        ? `<span class="pts-badge pts-${pts}">${pts}pt</span>` : '';
      centerContent = `
        <div class="real-score">${res.h}<span class="sep" style="font-size:.9rem;margin:0 .2rem">–</span>${res.a}</div>
        ${ptsHtml}
        ${pred ? `<div class="pred-display" style="font-size:.9rem">(jij: ${pred.h}–${pred.a})</div>` : ''}`;
    } else if (locked) {
      // locked, no result yet
      centerContent = pred
        ? `<div class="pred-display">${pred.h} – ${pred.a}</div><span class="locked-badge">Gesloten</span>`
        : `<span class="locked-badge">Gesloten</span>`;
    } else {
      // open for prediction
      centerContent = `
        <div class="score-row">
          <input class="score-in" type="number" min="0" max="30"
            value="${hv}" placeholder="–" oninput="setPred('${m.id}','h',this.value)"

    return `

  return `

    <div style="display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1.25rem">
      <div><div class="txt-sm txt-muted" style="margin-bottom:.4rem">Groep</div>

      <div><div class="txt-sm txt-muted" style="margin-bottom:.4rem">Speelronde</div>

      ${S.dirty ? `<button class="btn btn-outline btn-sm" onclick="S.view='code';render()">Mijn code →</button>` : ''}

function fG(g) { S.filterG = g; render(); }
function fD(d) { S.filterD = d; render(); }

function setPred(id, side, val) {
  const n = val === '' ? null : Math.max(0, Math.min(30, parseInt(val) || 0));
  if (!S.preds[id]) S.preds[id] = { h: null, a: null };
  S.preds[id][side] = n;
  S.dirty = true;
}

function scoreKey(e, id, nextSide) {
  // Tab/Enter moves to next input
  if ((e.key === 'Tab' || e.key === 'Enter') && nextSide) {
    e.preventDefault();
    const inputs = document.querySelectorAll('.score-in');
    const cur = e.target;
    const idx = Array.from(inputs).indexOf(cur);
    if (idx + 1 < inputs.length) inputs[idx + 1].focus();
  }
}

function copyCode(preview) {
  const box = document.getElementById('codebox');
  if (box) {
    navigator.clipboard.writeText(box.textContent).then(() => {
      toast('✓ Code gekopieerd!', 'green');
    }).catch(() => {
      // fallback
      const sel = window.getSelection();
      const range = document.createRange();
      range.selectNodeContents(box);
      sel.removeAllRanges();
      sel.addRange(range);
      toast('Selecteer en kopieer handmatig', '');
    });
  }
}

function checkPin() {
  const v = document.getElementById('pinput')?.value;
  if (v === ADMIN_PIN) {
    S.admin.unlocked = true; render();
  } else {
    toast('Verkeerde PIN', 'orange');
  }
}

function importCode() {
  const raw = document.getElementById('codeinput')?.value;
  if (!raw) return;
  const parsed = parseCode(raw);
  if (!parsed || !parsed.n) { toast('Ongeldige code', 'orange'); return; }
  const existing = S.admin.players.findIndex(p => p.name === parsed.n);
  if (existing >= 0) {
    S.admin.players[existing] = { name: parsed.n, preds: parsed.p || {} };
    toast(`✓ ${parsed.n} bijgewerkt`, 'green');
  } else {
    S.admin.players.push({ name: parsed.n, preds: parsed.p || {} });
    toast(`✓ ${parsed.n} toegevoegd`, 'green');
  }
  document.getElementById('codeinput').value = '';
  save(); render();
}

function importSelf() {
  if (!S.name) { toast('Je bent niet ingelogd als speler', 'orange'); return; }
  const existing = S.admin.players.findIndex(p => p.name === S.name);
  if (existing >= 0) {
    S.admin.players[existing] = { name: S.name, preds: S.preds };
  } else {
    S.admin.players.push({ name: S.name, preds: S.preds });
  }
  toast(`✓ ${S.name} toegevoegd`, 'green');
  save(); render();
}

function removePlayer(i) {
  S.admin.players.splice(i, 1);
  save(); render();
}

function setResult(id, side, val) {
  const n = val === '' ? null : Math.max(0, Math.min(30, parseInt(val) || 0));
  if (!S.admin.results[id]) S.admin.results[id] = { h: null, a: null };
  S.admin.results[id][side] = n;
  S.dirty = true;
}

function shareLink() {
  const state = { players: S.admin.players, results: S.admin.results };
  const hash = btoa(JSON.stringify(state));
  const url = window.location.origin + window.location.pathname + '#lb=' + hash;
  navigator.clipboard.writeText(url).then(() => {
    toast('✓ Link gekopieerd!', 'green');
  }).catch(() => {
    prompt('Kopieer de link:', url);
  });
}

function loadFromHash() {
  const hash = window.location.hash;
  if (hash.startsWith('#lb=')) {
    try {
      const data = JSON.parse(atob(hash.slice(4)));
      if (data.players) S.admin.players = data.players;
      if (data.results) S.admin.results = data.results;
      S.view = 'lb';
    } catch {}
  }
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function render() {
  const v = S.view;
  const navItems = [
    { id: 'preds', label: '⚽ Voorspellingen', show: !!S.name },
    { id: 'code',  label: '📋 Mijn code',      show: !!S.name },
    { id: 'lb',    label: '🏆 Ranglijst',       show: true },
    { id: 'admin', label: '🔐 Beheer',          show: true },
  ];

  const showHeader = v !== 'welcome';
  const header = showHeader ? `
  <header class="header">
    <div class="header-inner">
      <div class="logo">⚽ WK2026 <em>·</em> POULE</div>
      <nav class="nav">
        ${navItems.filter(n => n.show).map(n =>
          `<button class="nav-btn ${v === n.id ? 'active' : ''}" onclick="S.view='${n.id}';render()">${n.label}</button>`
        ).join('')}
      </nav>
      ${S.name ? `<span class="txt-sm txt-muted" style="white-space:nowrap">👤 ${esc(S.name)}</span>` : ''}
    </div>
  </header>` : '';

  const content =
    v === 'welcome' ? viewWelcome() :
    v === 'preds'   ? viewPreds() :
    v === 'code'    ? viewCode() :
    v === 'lb'      ? viewLb() :
    v === 'admin'   ? viewAdmin() : '';

  document.getElementById('app').innerHTML = `<div id="appwrap" style="display:flex;flex-direction:column;min-height:100vh">${header}${content}</div>`;
}

// ─────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────
load();
loadFromHash();
render();

// keyboard shortcut: Enter on welcome
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && S.view === 'welcome') doStartName();
});
</script>
</body>
</html>
